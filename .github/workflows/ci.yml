name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependências
        run: dotnet restore SistemaEventos.sln

      - name: Build
        run: dotnet build SistemaEventos.sln --no-restore -c Release

      - name: Testes
        run: dotnet test SistemaEventos.sln --no-build -c Release